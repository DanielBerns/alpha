<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }} - {% endif %}{{ config.get('site_title', 'My Static Site') }}</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>{% if title %}{{ title }}{% else %}{{ config.get('site_title', 'My Static Site') }}{% endif %}</h1>
            <nav><a href="index.html">← Back to Index</a></nav>
        </header>
        <main>
            {{ content }}
        </main>
        <footer>
            <p>&copy; 2026</p>
        </footer>
    </div>
</body>
</html>
